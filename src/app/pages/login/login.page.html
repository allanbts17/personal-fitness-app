<ion-content class="bg-gray-100">
  <div class="min-h-full flex flex-col justify-center items-center p-4">
    <!-- Main Card -->
    <div class="w-full max-w-[400px] bg-white rounded-lg shadow-material p-8 transition-all">
      
      <!-- Icon/Avatar -->
      <div class="flex justify-center mb-6">
        <div class="w-16 h-16 bg-material-blue rounded-full flex items-center justify-center shadow-lg">
          <ion-icon name="person" class="text-white text-3xl"></ion-icon>
        </div>
      </div>

      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-2xl font-medium text-gray-800 m-0">Iniciar sesión</h1>
        <p class="text-sm text-gray-500 mt-1">para continuar con tu cuenta</p>
      </div>


      <!-- Form Inputs -->
      <div class="space-y-2">
        <ion-item lines="none" class="input-item">
          <ion-input
            type="email"
            [(ngModel)]="email"
            label="Correo electrónico"
            label-placement="floating"
            placeholder="usuario@ejemplo.com"
            autocomplete="email"
          ></ion-input>
        </ion-item>

        <ion-item lines="none" class="input-item">
          <ion-input
            color="primary"
            type="password"
            [(ngModel)]="password"
            label="Contraseña"
            label-placement="floating"
            placeholder="••••••••"
            [type]="showPassword ? 'text' : 'password'"
          ></ion-input>
          <ion-button slot="end" fill="clear" class="eye-btn" (click)="showPassword = !showPassword">
            <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" class="text-gray-400"></ion-icon>
          </ion-button>
        </ion-item>
      </div>

      <!-- Options -->
      <div class="flex items-center justify-between mt-8 mb-6">
        <div class="flex items-center">
          <input type="checkbox" [(ngModel)]="rememberMe" id="remember" class="w-4 h-4 text-material-blue border-gray-300 rounded focus:ring-material-blue" />
          <label for="remember" class="ml-2 text-sm text-gray-600">Mantener sesión</label>
        </div>
        <a href="#" class="text-xs font-medium text-material-blue uppercase tracking-wider hover:underline">¿Olvidaste tu contraseña?</a>
      </div>

      <!-- Sign In Button -->
      <ion-button (click)="login()" 
              class="w-full text-white py-3 rounded font-medium uppercase text-sm mb-8">
        Iniciar Sesión
      </ion-button>

      <!-- Footer -->
      <div class="text-center mt-8">
        <p class="text-sm text-gray-600">
          ¿No tienes cuenta? <a routerLink="/register" class="text-material-blue font-medium hover:underline cursor-pointer">Crear cuenta</a>
        </p>
      </div>

    </div>
  </div>
</ion-content>

<app-header title="Registrar Estudiantes" [showBackButton]="true" defaultHref="/instructor/dashboard"></app-header>

<ion-content class="ion-padding bg-gray-50">
  <div class="max-w-md mx-auto mt-6 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
    <div class="text-center mb-6">
      <div class="bg-blue-100 text-blue-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
        <ion-icon name="person-add" class="text-3xl"></ion-icon>
      </div>
      <h2 class="text-xl font-bold text-gray-800">Nuevos Estudiantes</h2>
      <p class="text-sm text-gray-500 mt-1">Registra las cuentas de tus estudiantes</p>
    </div>

    <!-- Contraseña compartida -->
    <div class="mb-6 bg-blue-50 p-4 rounded-xl border border-blue-100">
        <label class="text-sm font-semibold text-blue-900 mb-2 block">Contraseña Temporal para Todos</label>
        <p class="text-xs text-blue-700 mb-3">Los estudiantes usarán esta contraseña la primera vez y luego podrán cambiarla.</p>
        <ion-input 
            type="text" 
            [(ngModel)]="tempPassword"
            class="bg-white border focus:border-blue-500 rounded-lg px-4 h-12"
            placeholder="Ej. Temporal123!">
        </ion-input>
    </div>

    <!-- Correos individuales -->
    <div class="space-y-3">
        <div *ngFor="let student of students; let i = index" class="flex items-center space-x-2">
            <ion-input 
                type="email" 
                [(ngModel)]="students[i].email" 
                class="bg-gray-50 border rounded-lg px-4 h-12 flex-1 outline-none"
                [placeholder]="'Correo del estudiante ' + (i + 1)">
            </ion-input>
            <ion-button 
                *ngIf="students.length > 1" 
                (click)="removeStudent(i)" 
                color="danger" 
                fill="clear" 
                class="h-12 w-12 rounded-lg m-0">
                <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
            </ion-button>
        </div>
    </div>

    <!-- Añadir más -->
    <ion-button fill="outline" color="primary" expand="block" class="ion-margin-top h-12 border-dashed font-semibold" (click)="addStudent()">
        <ion-icon name="add-circle-outline" slot="start"></ion-icon>
        Añadir otro correo
    </ion-button>

    <!-- Botón Principal -->
    <ion-button expand="block" color="primary" class="ion-margin-top mt-10 h-12 font-bold" (click)="registerStudents()">
        <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>
        Registrar Estudiantes
    </ion-button>
  </div>
</ion-content>

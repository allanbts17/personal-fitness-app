<app-header title="Catálogo de Ejercicios" [showBackButton]="true" defaultHref="/instructor/manage-routines"></app-header>

<ion-content class="ion-padding bg-gray-50">
  <div class="max-w-4xl mx-auto mt-8">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold text-gray-800">Catálogo de Ejercicios</h1>
    </div>

    <!-- Lista principal (solo visible si no hay nada seleccionado) -->
    <div *ngIf="!selectedExercise">
      
      <!-- Buscador -->
      <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 mb-6">
        <ion-searchbar 
           placeholder="Buscar ejercicio..." 
           [debounce]="250" 
           (ionInput)="filterExercises($event)"
           class="p-0">
        </ion-searchbar>
      </div>

      <!-- Lista de Ejercicios -->
      <div class="bg-white rounded-lg shadow-sm border border-gray-100 divide-y divide-gray-100">
        <div *ngIf="filteredExercises.length === 0" class="p-8 text-center text-gray-500">
          No se encontraron ejercicios.
        </div>

        <div *ngFor="let ex of filteredExercises" 
             class="p-4 flex items-center justify-between hover:bg-gray-50 transition-colors cursor-pointer"
             (click)="selectExercise(ex)">
          
          <div class="flex items-center space-x-4">
            <!-- Icono o Imagen pequeña -->
            <div class="bg-blue-100 w-12 h-12 rounded-lg flex items-center justify-center text-blue-600 overflow-hidden">
              <img *ngIf="ex.videoUrl" [src]="ex.videoUrl" class="w-full h-full object-cover">
              <ion-icon *ngIf="!ex.videoUrl" name="barbell-outline" class="text-2xl"></ion-icon>
            </div>
            
            <div>
              <h3 class="text-md font-semibold text-gray-800">{{ ex.name }}</h3>
              <p class="text-xs text-gray-500 line-clamp-1">{{ ex.description || 'Sin descripción pautada.' }}</p>
            </div>
          </div>
          
          <ion-button fill="clear" color="primary">
            <ion-icon name="create-outline" slot="icon-only"></ion-icon>
          </ion-button>
        </div>
      </div>
    </div>

    <!-- Formulario de Edición (visible solo cuando hay algo seleccionado) -->
    <div *ngIf="selectedExercise" class="bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden">
      
      <!-- Header de Edición -->
      <div class="bg-gray-50 px-6 py-4 border-b border-gray-200 flex justify-between items-center">
         <h2 class="font-bold text-gray-800 text-lg">Editar: {{ selectedExercise.name }}</h2>
         <ion-button (click)="cancelEdit()" fill="clear" color="medium" size="small">
            <ion-icon name="close-outline" slot="icon-only"></ion-icon>
         </ion-button>
      </div>

      <div class="p-6 space-y-6">
        
        <!-- Nombre -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombre del Ejercicio <span class="text-red-500">*</span></label>
          <ion-input
            type="text"
            [(ngModel)]="editName"
            class="bg-gray-50 border border-gray-200 rounded-lg px-4"
          ></ion-input>
          <p class="text-xs text-gray-500 mt-1">El nombre ayuda al sistema a enlazarlo con el Excel.</p>
        </div>

        <!-- Descripción -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Descripción / Instrucciones</label>
          <ion-textarea
            [(ngModel)]="editDescription"
            rows="4"
            placeholder="Explica cómo realizar el ejercicio correctamente..."
            class="bg-gray-50 border border-gray-200 rounded-lg px-4 py-2"
          ></ion-textarea>
        </div>

        <!-- URL de Imagen -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">URL de Imagen (GIF, PNG, JPG)</label>
          <ion-input
            type="url"
            [(ngModel)]="editVideoUrl"
            placeholder="https://ejemplo.com/ejercicio.gif"
            class="bg-gray-50 border border-gray-200 rounded-lg px-4"
          ></ion-input>
        </div>

        <!-- Previsualizar Imagen -->
        <div *ngIf="editVideoUrl" class="mt-4">
          <label class="block text-sm font-medium text-gray-700 mb-2">Vista previa de la imagen</label>
          <div class="border-2 border-dashed border-gray-300 rounded-lg p-2 max-w-sm">
             <img [src]="editVideoUrl" class="w-full h-auto rounded" (error)="editVideoUrl = ''" alt="Preview no disponible">
          </div>
        </div>

        <!-- Botones de Acción -->
        <div class="flex space-x-4 pt-4 border-t border-gray-100">
          <ion-button (click)="cancelEdit()" fill="outline" color="medium" class="flex-1">
            Cancelar
          </ion-button>
          
          <ion-button (click)="saveChanges()" color="primary" class="flex-1">
            <ion-icon name="save-outline" slot="start"></ion-icon>
            Guardar Cambios
          </ion-button>
        </div>
        
      </div>
    </div>

  </div>
</ion-content>

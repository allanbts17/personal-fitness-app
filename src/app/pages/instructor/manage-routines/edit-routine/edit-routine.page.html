<app-header title="Editar Rutina" [showBackButton]="true" defaultHref="/instructor/manage-routines"></app-header>

<ion-content class="ion-padding bg-gray-50">
  <div class="max-w-4xl mx-auto mt-8 mb-20" *ngIf="routine">
    
    <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100 mb-6">
      <label class="block text-sm font-medium text-gray-700 mb-1">Nombre de la Rutina</label>
      <ion-input
        type="text"
        [(ngModel)]="routine.name"
        class="bg-gray-50 border border-gray-200 rounded-lg px-4 font-bold text-xl"
      ></ion-input>
    </div>

    <!-- Lista regida por Reorder -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden">
      <div class="bg-gray-50 px-6 py-4 border-b border-gray-200 flex justify-between items-center">
         <h2 class="font-bold text-gray-800">Ejercicios ({{ routine.exercises.length || 0 }})</h2>
         <p class="text-xs text-gray-500">Arrastra para reordenar</p>
      </div>

      <ion-reorder-group [disabled]="false" (ionItemReorder)="handleReorder($event)">
        <div *ngFor="let session of routine.exercises; let i = index" 
             class="border-b border-gray-100 hover:bg-gray-50 transition-colors p-4 flex flex-col sm:flex-row items-center justify-between gap-4">
          
          <div class="flex items-center w-full sm:w-auto flex-1">
            <!-- Handle de Reorder -->
            <ion-reorder slot="start" class="mr-4 text-gray-400"></ion-reorder>
            
            <div class="flex items-center space-x-3 flex-1">
               <span class="bg-purple-100 text-purple-800 text-xs font-bold w-6 h-6 flex items-center justify-center rounded-full">
                 {{ session.order }}
               </span>
               <span class="font-medium text-gray-800">{{ session.exerciseName }}</span>
            </div>
          </div>

          <!-- Controles de Edición de la Sessión -->
          <div class="flex flex-wrap items-center gap-3 w-full sm:w-auto">
            
            <div class="flex items-center bg-gray-100 rounded-lg px-2 py-1">
              <span class="text-xs text-gray-500 mr-2">Series:</span>
              <ion-input type="number" [(ngModel)]="session.sets" class="w-16 text-center text-sm font-bold bg-white rounded border border-gray-200"></ion-input>
            </div>

            <div class="flex items-center bg-gray-100 rounded-lg px-2 py-1">
              <span class="text-xs text-gray-500 mr-2">Segs/Reps:</span>
              <ion-input type="number" [(ngModel)]="session.durationValue" class="w-16 text-center text-sm font-bold bg-white rounded border border-gray-200"></ion-input>
            </div>
            
            <div class="flex items-center bg-gray-100 rounded-lg px-2 py-1">
              <span class="text-xs text-gray-500 mr-2">Descanso:</span>
              <ion-input type="number" [(ngModel)]="session.restSeconds" class="w-16 text-center text-sm font-bold bg-white rounded border border-gray-200"></ion-input>
            </div>

            <ion-button fill="clear" color="danger" (click)="removeExercise(i)">
              <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
            </ion-button>

          </div>
        </div>
      </ion-reorder-group>
      
      <div *ngIf="!routine.exercises || routine.exercises.length === 0" class="p-8 text-center text-gray-500">
         No hay ejercicios en esta rutina.
      </div>
    </div>

    <!-- Botón Flotante para Guardar -->
    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t border-gray-200 flex justify-center z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)]">
        <div class="max-w-4xl w-full flex justify-end">
           <ion-button (click)="saveChanges()" color="primary" shape="round" class="w-full sm:w-auto px-8 shadow-lg">
             <ion-icon name="save-outline" slot="start"></ion-icon>
             Guardar Rutina
           </ion-button>
        </div>
    </div>

  </div>
</ion-content>

<ion-content class="bg-gray-100">
  <div class="min-h-full flex flex-col justify-center items-center p-4">
    <!-- Main Card -->
    <div class="w-full max-w-[400px] bg-white rounded-lg shadow-material p-8 transition-all relative">
      
      <!-- Back button -->
      <ion-button routerLink="/login" fill="clear" color="dark" class="absolute top-2 left-2">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </ion-button>

      <!-- Icon/Avatar -->
      <div class="flex justify-center mb-6 mt-2">
        <div class="w-16 h-16 bg-material-blue rounded-full flex items-center justify-center shadow-lg">
          <ion-icon name="key-outline" class="text-white text-3xl"></ion-icon>
        </div>
      </div>

      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-2xl font-medium text-gray-800 m-0">Recuperar contraseña</h1>
        <p class="text-sm text-gray-500 mt-2">Ingresa tu correo electrónico para recibir un enlace de recuperación.</p>
      </div>

      <!-- Form Inputs -->
      <div class="space-y-4">
        <ion-item lines="none" class="input-item">
          <ion-input
            type="email"
            [(ngModel)]="email"
            label="Correo electrónico"
            label-placement="floating"
            placeholder="usuario@ejemplo.com"
            autocomplete="email"
          ></ion-input>
        </ion-item>
      </div>

      <!-- Loading State -->
      <div *ngIf="isLoading" class="flex justify-center my-4">
        <ion-spinner name="crescent" color="primary"></ion-spinner>
      </div>

      <!-- Submit Button -->
      <ion-button (click)="resetPassword()" 
              [disabled]="isLoading || !email"
              class="w-full text-white py-3 rounded font-medium uppercase text-sm mt-8">
        Enviar enlace
      </ion-button>

      <!-- Footer -->
      <div class="text-center mt-8">
        <p class="text-sm text-gray-600">
          ¿Recordaste tu contraseña? <a routerLink="/login" class="text-material-blue font-medium hover:underline cursor-pointer">Inicia sesión</a>
        </p>
      </div>

    </div>
  </div>
</ion-content>

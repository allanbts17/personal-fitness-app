<div 
  [routerLink]="link"
  class="bg-white p-6 rounded-lg shadow-sm border border-gray-100 hover:shadow-md transition-shadow cursor-pointer">
  <div class="flex items-center space-x-4">
    <!-- El uso de w-12 h-12 flex items-center justify-center shrink-0 en lugar de padding garantiza un círculo perfecto -->
    <div [ngClass]="[iconBgClass, iconTextClass, 'w-12', 'h-12', 'flex', 'items-center', 'justify-center', 'shrink-0', 'rounded-full']">
      <ion-icon [name]="iconName" class="text-2xl"></ion-icon>
    </div>
    <div>
      <h3 class="text-lg font-semibold text-gray-800">{{ title }}</h3>
      <p class="text-sm text-gray-500">{{ description }}</p>
    </div>
  </div>
</div>
